<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Modal</title>
    <link rel="stylesheet" href="../css/session-modal2.css">
</head>

<body>
    <button>Open Modal</button>
    <div class="pdt-parent-modal" role="dialog" aria-modal="true">
        <h2>Add New Session</h2>
        <div  class="pdt-section-divider"></div>
        <form class="pdt-form" action="">
            <div class="pdt-panel pdt-panel--1">
                <p>1- Date</p>
                <div class="pdt-date-options">
                    <label>
                        <input type="radio" name="date_mode" value="single" checked="checked">
                        Single Date
                    </label>
                    <input type="date" name="date" id="date">

                    <label>
                        <input type="radio" name="date_mode" value="range">
                        Date Range
                    </label>
                    <div class="pdt-date-range">
                        <input type="date" name="date_start" id="date-start">
                        <span>to</span>
                        <input type="date" name="date_end" id="date-end">
                    </div>

                    <label>
                        <input type="radio" name="date_mode" value="self_paced">
                        Self Paced
                    </label>
                </div>
            </div>
            <div class="pdt-panel pdt-panel--2">
                <div class="pdt-Length">
                    <p>2- Length (minutes)</p>
                    <input type="text" name="length" id="length">
                </div>
            </div>
            <div class="pdt-panel pdt-panel--3">
                <div class="pdt-flags">
                    <p>3- Flags</p>
                    <p><small><u>Frequent Flags</u></small></p>
                    <div class="pdt-flag-list" aria-label="Recent flags">
                        <label>
                            <input type="checkbox" name="flags" value="general">
                            General
                        </label>
                        <label>
                            <input type="checkbox" name="flags" value="ppo">
                            PPO
                        </label>
                        <label>
                            <input type="checkbox" name="flags" value="advanced">
                            Advanced
                        </label>

                        <div class="pdt-section-divider" aria-hidden="true"></div>
                    </div>


                    <label for="flag-search">Find or Add Flag</label><br>
                    <input type="search" name="flag_search" id="flag-search" placeholder="Search flags">
                    <button>Add Flag</button>
                </div>
            </div>
            <div class="pdt-panel pdt-panel--4">
                <div class="pdt-textfields">
                    <div class="pdt-session-modal__organizer-field">
                        <label for="organizer">4- Organizer</label><br>
                        <textarea name="organizer" class="textbox" id="organizer" rows="2"></textarea>
                    </div>
                    <div class="pdt-session-modal__title-field">
                        <label for="session_title">Session Title</label><br>
                        <textarea name="session_title" class="textbox" id="session_title" rows="2"></textarea>
                    </div>
                    <div class="pdt-session-modal__parent-event-field">
                        <label for="parent_event">Parent Event</label><br>
                        <textarea name="parent_event" class="textbox" id="parent_event" rows="2"
                            placeholder="Part of confrence or larger event? Otherwise leave blank"></textarea>
                    </div>
                </div>
            </div>
            <div class="pdt-panel pdt-panel--5">
                <div class="pdt-session-type">
                    <h4>5- Session Type</h4>
                    <select name="session_type" id="session_type">
                        <option value="lecture">Lecture</option>
                        <option value="workshop">Workshop</option>
                        <option value="panel">Panel</option>
                        <option value="breakout">Breakout</option>
                        <option value="roundtable">Roundtable</option>
                    </select>
                </div>
                <div class="pdt-event-type">
                    <h4>Event Type</h4>
                    <select name="event_type" id="event_type">
                        <option value="lecture">Lecture</option>
                        <option value="workshop">Workshop</option>
                        <option value="panel">Panel</option>
                        <option value="breakout">Breakout</option>
                        <option value="roundtable">Roundtable</option>
                    </select>
                </div>
                <div class="pdt-rid-qualified">
                    <h4>RID Qualified?</h4>
                    <select name="rid_qualified" id="rid_qualified">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>
            </div>
            <div class="pdt-panel pdt-panel--6">
                <div class="pdt-event-type">
                    <p>6- Qualify for CEUs?</p>
                    <select name="qual_for_CEU" id="qual_for_ceu">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>
            </div>
            <div class="pdt-panel pdt-panel--7">
                <div class="pdt-ceu-weight">
                    <p>7- CEU Weight</p>
                    <input type="text" name="CEU Weight" id="CEU Weight" disabled="disabled" placeholder="0.00">
                </div>
            </div>
            <div class="pdt-panel pdt-panel--8">
                <div class="pdt-session-modal__presenters-field">
                    <p>8- Presenter(s)</p>
                    <input type="text" name="presenters" id="presenters" placeholder="Enter presenter names">
                </div>
            </div>
            <div class="pdt-panel pdt-panel--9">
                <button>Save Session</button>
                <button>Cancel</button>
            </div>
        </form>
    </div>

</body>

</html>
