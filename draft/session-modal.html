<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Modal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            display: grid;
            place-items: center;
            background: #f7f7f8;
            font-family: Arial, Helvetica, sans-serif;
        }

        .parent {
            display: grid;
            width: min(100%, 560px);
            max-height: 85vh;
            overflow-y: auto;
            padding: 16px;
            border: 2px solid #d4d4d8;
            border-radius: 12px;
            background: #ffffff;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-auto-rows: minmax(72px, auto);
            gap: 8px;
        }

        .parent>div {
            min-width: 0;
            padding: 16px;
            border-radius: 10px;
            background: #f4f4f5;
            border: 1px solid #e4e4e7;
        }

        .div1 {
            grid-row: span 2 / span 2;
        }

        .div3 {
            grid-row: span 3 / span 3;
            grid-column-start: 2;
        }

        .div4 {
            grid-row: span 2 / span 2;
            grid-row-start: 3;
        }

        .div5 {
            grid-column: span 2 / span 2;
            grid-row-start: 5;
        }

        .div6 {
            grid-row-start: 6;
        }

        .div7 {
            grid-row-start: 6;
        }

        .div8 {
            grid-column: span 2 / span 2;
            grid-row-start: 7;
        }

        /* TODO: add a media for it the viewport is too narrow.
            add a vertical overflow so the person can scroll the modal. */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .parent {
                width: 100%;
                grid-template-columns: minmax(0, 1fr);
            }

            .div1,
            .div3,
            .div4,
            .div5,
            .div6,
            .div7,
            .div8 {
                grid-column: auto;
                grid-row: auto;
                grid-row-start: auto;
            }
        }

        /* TODO: use the following below if the width
         of the viewport is large enough. */
        @media (min-width: 900px) {
            .parent {
                width: min(100%, 860px);
                grid-template-columns: repeat(3, minmax(0, 1fr));
                grid-template-rows: repeat(7, minmax(72px, auto));
            }

            .div1 {
                grid-row: span 2 / span 2;
            }

            .div2 {
                grid-column-start: 1;
                grid-row-start: 3;
            }

            .div3 {
                grid-row: span 3 / span 3;
                grid-column-start: 3;
                grid-row-start: 2;
            }

            .div4 {
                grid-row: span 2 / span 2;
                grid-column-start: 2;
                grid-row-start: 2;
            }

            .div5 {
                grid-column: span 2 / span 2;
                grid-column-start: 1;
                grid-row-start: 4;
            }

            .div6 {
                grid-column-start: 2;
                grid-row-start: 1;
            }

            .div7 {
                grid-column-start: 3;
                grid-row-start: 1;
            }

            .div8 {
                grid-column: span 2 / span 2;
                grid-row-start: 5;
            }
        }
    </style>
</head>

<body>
    
    <div class="parent">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
        <div class="div5">5</div>
        <div class="div6">6</div>
        <div class="div7">7</div>
        <div class="div8">8</div>
    </div>

</body>

</html>
