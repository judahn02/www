<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"
        integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg=="
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/homepage.css">
    <title>Professional Development Tracking</title>
</head>

<body>
    <div class="pdt-main">
        <h1>Admin Home Dashboard</h1>

        <div class="pdt-grid">
            <div class="pdt-grid-item">
                <a class="pdt-grid-link" href="#">Session Table</a>
            </div>
            <div class="pdt-grid-item">
                <a class="pdt-grid-link" href="#">Presenter Table</a>
            </div>
            <div class="pdt-grid-item">
                <a class="pdt-grid-link" href="#">Attendee Table</a>
            </div>
        </div>

        <div class="pdt-home-panels">
            <div class="pdt-db-config">
                <h3>DB Configuration Settings</h3>

                <p>DB URI</p>
                <input id="pdt-db-uri" type="text">
                <p>DB Name</p>
                <input id="pdt-db-name" type="text">
                <br>
                <button id="pdt-save-credentials-btn" type="button">Save Credentials</button>
                <br>
                <button id="pdt-generate-keypairs-btn" type="button">Generate KeyPairs</button>
                <p id="pdt-jwt-key-status" class="pdt-db-config__status" role="status" aria-live="polite" hidden></p>
            </div>

            <div class="pdt-tutorials">
                <h3>Short Tutorial/ Guide</h3>
                <ul class="pdt-tutorials__list">
                    <li class="pdt-tutorials__item"><a class="pdt-tutorials__link" href="">link </a></li>
                    <li class="pdt-tutorials__item"><a class="pdt-tutorials__link" href="">link </a></li>
                    <li class="pdt-tutorials__item"><a class="pdt-tutorials__link" href="">link </a></li>
                    <li class="pdt-tutorials__item"><a class="pdt-tutorials__link" href="">link </a></li>
                </ul>
            </div>
        </div>
    </div>
    <script type="module" src="../js/home-page.js"></script>
</body>

</html>
